<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline | BriefAI</title>
    <style>
        :root {
            --bg-primary: #000000;
            --accent-purple: #9333ea;
            --accent-green: #22c55e;
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, inherit;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            overflow: hidden;
        }

        .container {
            max-width: 400px;
            padding: 2rem;
            position: relative;
            z-index: 10;
        }

        .logo-container {
            margin-bottom: 2.5rem;
            position: relative;
        }

        .logo-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 120px;
            height: 120px;
            background: radial-gradient(circle, var(--accent-purple) 0%, transparent 70%);
            filter: blur(40px);
            opacity: 0.3;
            animation: pulse 4s infinite ease-in-out;
        }

        @keyframes pulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.2; }
            50% { transform: translate(-50%, -50%) scale(1.2); opacity: 0.4; }
        }

        .logo {
            width: 80px;
            height: 80px;
            display: block;
            margin: 0 auto;
        }

        h1 {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 1rem;
            letter-spacing: -0.05em;
            background: linear-gradient(135deg, #fff 0%, #a5b4fc 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: 1.1rem;
            line-height: 1.6;
            color: var(--text-secondary);
            margin-bottom: 2.5rem;
        }

        .btn {
            display: inline-block;
            background: linear-gradient(135deg, var(--accent-purple) 0%, #7e22ce 100%);
            color: white;
            padding: 1rem 2.5rem;
            border-radius: 99px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 15px rgba(147, 51, 234, 0.3);
            cursor: pointer;
            border: none;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(147, 51, 234, 0.5);
        }

        .btn:active {
            transform: translateY(0);
        }

        .status {
            margin-top: 3rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            opacity: 0.6;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            background-color: #ef4444;
            border-radius: 50%;
            box-shadow: 0 0 10px #ef4444;
            animation: blink 2s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        .status-text {
            font-size: 0.9rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        /* Abstract Background shapes */
        .shape {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
            z-index: 1;
        }

        .shape-1 {
            width: 300px;
            height: 300px;
            background-color: var(--accent-purple);
            top: -100px;
            right: -100px;
        }

        .shape-2 {
            width: 250px;
            height: 250px;
            background-color: var(--accent-green);
            bottom: -50px;
            left: -50px;
        }

    </style>
</head>
<body>
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>

    <div class="container">
        <div class="logo-container">
            <div class="logo-glow"></div>
            <img src="/logo.svg" alt="BriefAI Logo" class="logo">
        </div>
        
        <h1>You're Offline</h1>
        <p>Your intelligence briefing requires a connection. We'll be ready as soon as you're back online.</p>
        
        <button class="btn" onclick="window.location.reload()">REFRESH PAGE</button>

        <div class="status">
            <div class="status-dot"></div>
            <div class="status-text">Disconnected</div>
        </div>
    </div>
</body>
</html>
